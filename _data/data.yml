career-profile:
  title: Profile
  summary: |
    Cloud & Infrastructure Engineer with experience delivering modern workplace, identity, and infrastructure transformation across enterprise Microsoft environments.

    Strong background in Microsoft 365, Azure, and hybrid infrastructure, with a focus on identity-driven security, access control, and endpoint governance. Experienced in large-scale migrations, SaaS integration, and modernising legacy systems through a cloud-first approach.

    Combines hands-on engineering with a pragmatic mindset, supporting and stabilising hybrid environments while enabling secure, scalable, and efficient digital workplaces.

experiences:
  title: Professional Experience
  info:

    - role: Cloud & Infrastructure Engineer
      time: April 2024 - Present
      company: Compass Community Ltd
      details: |
        - Design and implement Azure-based and hybrid infrastructure solutions supporting cloud-first transformation
        - Configure and manage identity platforms including Active Directory and Microsoft Entra ID (SSO, lifecycle management)
        - Implement Conditional Access, authentication policies, and security controls across cloud and endpoint environments
        - Support and optimise Microsoft 365 services (Exchange Online, Teams, SharePoint)
        - Act as 3rd line escalation point for complex infrastructure, networking, and identity incidents
        - Monitor infrastructure performance, availability, and security posture across hybrid environments
        - Implement backup, disaster recovery, and business continuity solutions
        - Support network connectivity across sites and cloud environments
        - Contribute to infrastructure transformation projects and service improvements
        - Maintain technical documentation, runbooks, and change records

    - role: Technical Consultant
      time: Jan 2024 - April 2024
      company: Trident Group
      details: |
        - Delivered technical consultancy across infrastructure and cloud environments
        - Supported client systems and contributed to service delivery improvements

    - role: Infrastructure Support Analyst
      time: March 2023 - Jan 2024
      company: Compass Community Ltd
      details: |
        - Acted as escalation point for complex incidents across Windows Server, Active Directory, Microsoft 365, and networking
        - Administered AD, Office 365, RDS, WSUS, Barracuda Email Security, and Azure environments
        - Performed server maintenance, updates, and infrastructure monitoring
        - Managed backup systems and performed data restores
        - Supported network infrastructure including firewalls, switches, and wireless systems
        - Contributed to infrastructure projects and rollout activities
        - Supported security improvements based on audit findings
        - Maintained technical documentation and operational procedures
        - Mentored junior IT staff
        - Supported VoIP and telephony systems

    - role: IT Support Analyst
      time: May 2021 - March 2023
      company: Compass Community Ltd
      details: |
        - Delivered 1st and 2nd line support across Microsoft 365, hardware, and software
        - Managed user accounts, permissions, and access requests
        - Supported SQL-backed line-of-business applications
        - Maintained ticketing records and knowledge base documentation

